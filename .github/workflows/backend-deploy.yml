name: Backend CI/CD (Azure App Service)

# Builds, tests, and deploys the ASP.NET Core 8 API to Azure App Service (Linux, no container).
# Triggers on push to main — the coordinator merges feat/backend-scaffold -> main when a slice is green.
# NO secrets or real resource names live in this file. Auth uses OIDC federated credentials; every
# value comes from GitHub Actions secrets/variables. See backend/docs/deployment.md for the full list.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: {}

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: backend/src/MyWifesDumplings.Api/MyWifesDumplings.Api.csproj
  TEST_PROJECT_PATH: backend/tests/MyWifesDumplings.Api.Tests/MyWifesDumplings.Api.Tests.csproj
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output "${{ env.PUBLISH_DIR }}"

      # Idempotent EF schema script — published as an artifact for audit / optional manual DBA apply.
      # The schema is actually applied at app startup via the guarded Database.Migrate() (see
      # Program.cs / deployment.md). This script is a safety net, NOT the active mechanism, and never
      # touches a database in CI.
      - name: Generate idempotent EF migrations script
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef migrations script --idempotent \
            --project ${{ env.PROJECT_PATH }} \
            --output "${{ env.PUBLISH_DIR }}/migrations.sql"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    name: Deploy to Azure App Service
    needs: build-test
    # Deployment is opt-in so CI remains green before Azure OIDC and App Service settings exist.
    # Set the repository variable AZURE_DEPLOY_ENABLED=true after configuring the values below.
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    # OIDC federated credentials: requires id-token write permission. No publish profile, no
    # long-lived credential is stored — azure/login exchanges the GitHub OIDC token for a short-lived
    # Azure token using the client/tenant/subscription ids supplied as GitHub secrets.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
